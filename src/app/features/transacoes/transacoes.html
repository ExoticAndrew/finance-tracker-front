<div class="transacoes-layout">
  <app-sidebar [nomeUsuario]="nomeUsuario" (logoutEvent)="logout()" />

  <main class="transacoes-main">
    <header class="transacoes-topbar">
      <div>
        <h1>Transações</h1>
        <p>Gerencie suas receitas e despesas</p>
      </div>
      <div class="topbar-acoes">
        <button class="btn-importar" (click)="abrirModalImportar()">
          <i class="ti ti-file-import"></i>
          Importar Excel
        </button>
        <button class="btn-nova" (click)="abrirModalNovo()">
          <i class="ti ti-plus"></i>
          Nova transação
        </button>
      </div>
    </header>

    <div class="transacoes-content">
      <app-lista-transacoes
        [transacoes]="transacoes()"
        [totalPages]="totalPages()"
        [paginaAtual]="paginaAtual()"
        [carregando]="carregando()"
        (editar)="abrirModalEditar($event)"
        (deletar)="onDeletado()"
        (mudarPagina)="carregar($event)" />
    </div>
  </main>

  @if (modalAberto()) {
    <app-modal-transacao
      [transacao]="transacaoEditando()"
      (fechar)="fecharModal()"
      (salvo)="onSalvo()" />
  }

  @if (modalImportarAberto()) {
    <app-importar-planilha-modal
      (fechar)="fecharModalImportar()"
      (importado)="onImportado()" />
  }
</div>
