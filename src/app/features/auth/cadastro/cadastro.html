<div class="auth-wrapper">
  <div class="auth-lado-esquerdo">
    <div class="logo" (click)="irParaLanding()">Fintrack</div>
    <div class="auth-texto">
      <h1>Comece a organizar<br>
        <span class="gradiente">suas finanças hoje.</span>
      </h1>
      <p>Crie sua conta grátis e tenha controle total do seu dinheiro em minutos.</p>
      <app-login-stats></app-login-stats>
    </div>
  </div>

  <div class="auth-lado-direito">
    <app-cadastro-form
      (abrirTermos)="abrirTermos()"
      (abrirPrivacidade)="abrirPrivacidade()">
    </app-cadastro-form>
  </div>
</div>

<app-login-modal
  [tipo]="modalAberto"
  (fechar)="fecharModal()">
</app-login-modal>
