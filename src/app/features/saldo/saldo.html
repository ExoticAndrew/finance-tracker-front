<div class="layout-shell">
  <app-sidebar [nomeUsuario]="nomeUsuario" (logoutEvent)="logout()" />

  <main class="layout-main">
    <header class="layout-topbar">
      <div>
        <h1>Saldo</h1>
        <p>Extrato completo com o saldo após cada movimentação.</p>
      </div>

      <div class="topbar-acoes">
        <select
          class="seletor-ano"
          [value]="anoSelecionado()"
          (change)="onAnoChange(+$any($event.target).value)">
          @for (ano of anosDisponiveis; track ano) {
            <option [value]="ano">{{ ano }}</option>
          }
        </select>

        <button
          type="button"
          class="btn-tema"
          (click)="temaService.alternar()"
          aria-label="Alternar tema claro/escuro">
          <i
            class="ti"
            [class.ti-sun]="temaService.tema() === 'escuro'"
            [class.ti-moon]="temaService.tema() === 'claro'"></i>
        </button>
      </div>
    </header>

    <div class="saldo-content">
      <app-resumo-saldo [resumo]="resumo()" />

      <app-grafico-evolucao-saldo [pontos]="pontosGrafico()" />

      <app-extrato-lista [linhas]="linhasDescendente()" />
    </div>
  </main>
</div>
