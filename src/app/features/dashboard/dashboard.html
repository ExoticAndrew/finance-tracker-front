<div class="dashboard-layout">
  <app-sidebar [nomeUsuario]="nomeUsuario" (logoutEvent)="logout()" />

  <main class="dashboard-main">
    <header class="dashboard-topbar">
      <div>
        <h1>Olá, {{ nomeUsuario }} </h1>
        <p>Aqui está o resumo das suas finanças hoje.</p>
      </div>

      <div class="topbar-acoes">
        <button
          type="button"
          class="btn-tema"
          (click)="temaService.alternar()"
          aria-label="Alternar tema claro/escuro">
          <i
            class="ti"
            [class.ti-sun]="temaService.tema() === 'escuro'"
            [class.ti-moon]="temaService.tema() === 'claro'"></i>
        </button>

        <div class="topbar-search">
          <i class="ti ti-search"></i>
          <span>Pesquisar...</span>
        </div>
      </div>
    </header>

    <div class="dashboard-content">
      <div class="col-main">
        <app-top-cards
          [totalReceitas]="totalReceitas()"
          [totalDespesas]="totalDespesas()"
          [comparativo]="comparativo()" />

        <app-grafico-evolucao
          [totalReceitas]="totalReceitas()"
          [totalDespesas]="totalDespesas()" />

        <app-tabela-transacoes
          [transacoes]="transacoes()" />
      </div>

      <div class="col-right">
        <app-card-saldo [saldo]="saldo()" [nomeUsuario]="nomeUsuario" />
        <app-medidor-atividade />
      </div>
    </div>
  </main>
</div>
