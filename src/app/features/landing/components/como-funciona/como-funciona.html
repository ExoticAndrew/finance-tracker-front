<section id="como-funciona">
  <h2>Como funciona</h2>
  <p class="subtitulo">Simples, rápido e eficiente</p>

  <div class="passos">
    <div class="passo passo-1" appAnimarAoEntrar>
      <span class="numero-bg">01</span>
      <div class="icone-glow">
        <lucide-icon [img]="UserPlus" size="28"></lucide-icon>
      </div>
      <h3>Cadastre-se</h3>
      <p>Crie sua conta gratuitamente em menos de 1 minuto</p>
    </div>

    <div class="linha-conectora"></div>

    <div class="passo passo-2" appAnimarAoEntrar>
      <span class="numero-bg">02</span>
      <div class="icone-glow">
        <lucide-icon [img]="Wallet" size="28"></lucide-icon>
      </div>
      <h3>Registre suas transações</h3>
      <p>Adicione receitas e despesas de forma simples</p>
    </div>

    <div class="linha-conectora"></div>

    <div class="passo passo-3" appAnimarAoEntrar>
      <span class="numero-bg">03</span>
      <div class="icone-glow">
        <lucide-icon [img]="BarChart3" size="28"></lucide-icon>
      </div>
      <h3>Acompanhe seus resultados</h3>
      <p>Visualize relatórios e tenha controle total</p>
    </div>
  </div>
</section>
